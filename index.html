<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/image-jeremy.png"
    />

    <title>Time tracking dashboard</title>
    <link rel="stylesheet" href="./assets/css/index.css" />
    <script src="./assets/js/index.js" defer></script>
  </head>
  <body>
    <main class="container">
      <section class="head">
        <article class="user">
          <img src="./assets/images/image-jeremy.png" alt="Jeremy Robson" />
          <div class="user-info">
            <p>Report for</p>
            <h1>Jeremy Robson</h1>
          </div>
        </article>
        <article class="timeframe">
          <button class="btn" id="daily">Daily</button>
          <button class="btn active" id="weekly">Weekly</button>
          <button class="btn" id="monthly">Monthly</button>
        </article>
      </section>
      <section class="body" id="card-container"></section>
    </main>
  </body>
</html>
